<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D F1 Livery Studio</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #1a1a1a; padding: 15px 20px; text-align: center; border-bottom: 1px solid #333; z-index: 10; }
        
        /* The 3D Workspace takes up the whole screen under the header */
        #workspace { flex: 1; position: relative; width: 100%; display: block; }
        
        /* The WebGL Canvas */
        #viewport3d { width: 100%; height: 100%; display: block; }
        
        /* Floating UI Panel for Tools */
        #toolbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(26, 26, 26, 0.9); padding: 15px 25px; border-radius: 12px; display: flex; gap: 20px; border: 1px solid #444; backdrop-filter: blur(5px); }
        .tool-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        label { font-size: 0.75rem; font-weight: bold; color: #aaa; text-transform: uppercase; }
        input[type="color"] { border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; background: none; }
    </style>
</head>
<body>

    <header>
        <h1>🏎️ 3D F1 LIVERY STUDIO</h1>
    </header>

    <div id="workspace">
        <div id="viewport3d"></div>

        <div id="toolbar">
            <div class="tool-group">
                <label>Base Color</label>
                <input type="color" id="carColorPicker" value="#e10600">
            </div>
            <div class="tool-group">
                <label>Controls</label>
                <span style="font-size: 0.8rem; color: #ccc;">Left Click: Rotate | Right Click: Pan | Scroll: Zoom</span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
